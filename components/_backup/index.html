<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<!-- Framer Motion (UMD build that exposes window.Motion) -->
<script src="https://unpkg.com/framer-motion@10.18.0/dist/framer-motion.js"></script>
<script>
  // Re-export onto window so Babel-transpiled scripts can grab them.
  (function () {
    var FM = window.Motion || window.FramerMotion || window.framerMotion;
    if (!FM) {
      console.error("Framer Motion failed to load");
      return;
    }
    window.motion = FM.motion;
    window.AnimatePresence = FM.AnimatePresence;
    window.useScroll = FM.useScroll;
    window.useSpring = FM.useSpring;
    window.useTransform = FM.useTransform;
    window.useInView = FM.useInView;
    window.useMotionValue = FM.useMotionValue;
  })();
</script>
